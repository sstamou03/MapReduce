<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MapReduce Manager</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">
                <i class="ph-bold ph-terminal"></i>
                <span>MapReduce</span>
            </div>
            
            <nav class="nav-menu">
                <div class="nav-section">Orchestration</div>
                <button onclick="runCommand('minikube start --driver=docker', 'Start Minikube')" class="action-btn">
                    <i class="ph ph-rocket-launch"></i> Minikube Start
                </button>
                <button onclick="runCommand('minikube stop', 'Stop Minikube')" class="action-btn">
                    <i class="ph ph-stop-circle"></i> Minikube Stop
                </button>
                <button onclick="runCommand('kubectl apply -f k8s/', 'Apply Config')" class="action-btn">
                    <i class="ph ph-stack"></i> Apply Config
                </button>
                
                <div class="nav-section">Development</div>
                <button onclick="runBuildAll()" class="action-btn">
                    <i class="ph ph-cube-transparent"></i> Build & Deploy
                </button>

                <div class="nav-section">Access</div>
                <button onclick="openAllPorts()" class="action-btn">
                    <i class="ph ph-arrows-out-line"></i> Expose Services
                </button>
                <button onclick="closeAllPorts()" class="action-btn">
                    <i class="ph ph-x-circle"></i> Close Connections
                </button>
                
                <div class="nav-section">Services</div>
                <button onclick="togglePortForward('mapreduce-ui', 8001, 8000)" class="action-btn mini" id="pf-ui">
                    UI Service
                </button>
                <button onclick="togglePortForward('mapreduce-keycloak', 8080, 8080)" class="action-btn mini" id="pf-keycloak">
                    Auth (Keycloak)
                </button>
                <button onclick="togglePortForward('mapreduce-minio', 9000, 9000)" class="action-btn mini" id="pf-minio">
                    Storage (MinIO)
                </button>
            </nav>
            
            <div class="sidebar-footer">
                <div class="status-badge" id="m-status-badge">
                    <span id="m-status-text">Checking...</span>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <header class="header">
                <div class="header-main">
                    <h1>Overview</h1>
                    <div class="tabs">
                        <button class="tab-btn active" onclick="showTab('pods')">Cluster Health</button>
                        <button class="tab-btn" onclick="showTab('console')">Operations Log</button>
                    </div>
                </div>
                <button onclick="fetchPods()" class="refresh-btn"><i class="ph ph-arrows-clockwise"></i></button>
            </header>

            <!-- TAB: PODS -->
            <section id="tab-pods" class="tab-content active">
                <div class="pods-table">
                    <div class="table-header">
                        <div class="col-name">NAME</div>
                        <div class="col-ready">READY</div>
                        <div class="col-status">STATUS</div>
                        <div class="col-restarts">RESTARTS</div>
                        <div class="col-age">AGE</div>
                    </div>
                    <div id="pods-list" class="table-body">
                        <!-- Pod rows -->
                    </div>
                </div>
            </section>

            <!-- TAB: CONSOLE -->
            <section id="tab-console" class="tab-content">
                <div class="console-section">
                    <div class="console-header">
                        <div style="display:flex; align-items:center; gap:10px">
                            <span>Live Output</span>
                            <i id="console-spinner" class="ph-bold ph-circle-notch spinner" style="display:none; color:var(--accent)"></i>
                        </div>
                        <button onclick="clearConsole()" class="clear-btn">Clear</button>
                    </div>
                    <div class="console-output" id="console-output">
                        System ready.
                    </div>
                </div>
            </section>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
