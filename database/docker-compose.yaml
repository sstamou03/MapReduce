version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: mapreduce-postgres
    environment:
      POSTGRES_USER: mapreduce_user
      POSTGRES_PASSWORD: mapreduce_password
      POSTGRES_DB: mapreduce_db
    ports:
      - "5432:5432"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata:/var/lib/postgresql/data

  minio:
    image: minio/minio
    container_name: mapreduce-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: 12345678
    ports:
      - "9000:9000" # Το API port (για να μιλάει ο κώδικάς σας με το MinIO)
      - "9001:9001" # Το UI port (για να μπαίνεις από τον browser)
    volumes:
      - miniodata:/data

volumes:
  pgdata:
  miniodata:
