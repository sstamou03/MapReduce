apiVersion: v1
kind: Service
metadata:
  name: mapreduce-keycloak
spec:
  type: LoadBalancer
  ports:
    - port: 8080
      targetPort: 8080
  selector:
    app: mapreduce-keycloak
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mapreduce-keycloak
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mapreduce-keycloak
  template:
    metadata:
      labels:
        app: mapreduce-keycloak
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: ['sh', '-c', "until nc -z mapreduce-postgres 5432; do echo waiting for postgres; sleep 2; done"]
      containers:
        - name: mapreduce-keycloak
          image: quay.io/keycloak/keycloak:24.0.0
          args: ["start-dev"]
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: mapreduce-config
            - secretRef:
                name: mapreduce-secrets
