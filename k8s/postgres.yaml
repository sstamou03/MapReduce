apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-script
data:
  init.sql: |
    /*
    Initialization script for the MapReduce PostgreSQL database.
    This script automatically executes when the database container starts for the first time.
    It defines the custom ENUM types and creates the 'jobs' and 'tasks' tables,
    which act as the single source of truth for the cluster's state.
    */

    CREATE DATABASE keycloak_db;
    CREATE TYPE job_status AS ENUM ('SUBMITTED', 'RUNNING', 'COMPLETED', 'FAILED');
    CREATE TYPE task_status AS ENUM ('PENDING', 'RUNNING', 'RETRYING', 'COMPLETED', 'FAILED');
    CREATE TYPE task_type AS ENUM ('MAP', 'REDUCE');


    CREATE TABLE IF NOT EXISTS jobs (
        job_id UUID PRIMARY KEY,
        user_id VARCHAR(255) NOT NULL,
        status job_status DEFAULT 'SUBMITTED',
        input_code_ref VARCHAR(512) NOT NULL,
        mapper_code_ref VARCHAR(512) NOT NULL,
        reducer_code_ref VARCHAR(512) NOT NULL,
        output_code_ref VARCHAR(512),
        num_mappers INTEGER DEFAULT 3,
        num_reducers INTEGER DEFAULT 1,
        created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
        updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );

    CREATE TABLE IF NOT EXISTS tasks (
        task_id UUID PRIMARY KEY,
        job_id UUID REFERENCES jobs(job_id),
        task_type task_type NOT NULL,
        status task_status DEFAULT 'PENDING',
        worker_pod_id VARCHAR(255),
        input_partition_ref VARCHAR(512) NOT NULL,
        output_partition_ref VARCHAR(512),
        created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
        updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );
---
apiVersion: v1
kind: Service
metadata:
  name: mapreduce-postgres
spec:
  ports:
    - port: 5432
  selector:
    app: mapreduce-postgres
  clusterIP: None # Headless service for StatefulSet
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mapreduce-postgres
spec:
  serviceName: "mapreduce-postgres"
  replicas: 1
  selector:
    matchLabels:
      app: mapreduce-postgres
  template:
    metadata:
      labels:
        app: mapreduce-postgres
    spec:
      containers:
        - name: mapreduce-postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: mapreduce-secrets
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
            - name: init-script
              mountPath: /docker-entrypoint-initdb.d/init.sql
              subPath: init.sql
      volumes:
        - name: init-script
          configMap:
            name: postgres-init-script
  volumeClaimTemplates:
    - metadata:
        name: pgdata
      spec:
        accessModes: [ "ReadWriteOnce" ]
        resources:
          requests:
            storage: 2Gi
