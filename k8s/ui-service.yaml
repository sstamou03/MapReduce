apiVersion: v1
kind: Service
metadata:
  name: mapreduce-ui
spec:
  type: LoadBalancer
  ports:
    - port: 8000
      targetPort: 8000
  selector:
    app: mapreduce-ui
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mapreduce-ui
spec:
  replicas: 3
  selector:
    matchLabels:
      app: mapreduce-ui
  template:
    metadata:
      labels:
        app: mapreduce-ui
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: ['sh', '-c', "until nc -z mapreduce-postgres 5432; do echo waiting for postgres; sleep 2; done"]
        - name: wait-for-minio
          image: busybox:1.36
          command: ['sh', '-c', "until nc -z mapreduce-minio 9000; do echo waiting for minio; sleep 2; done"]
      containers:
        - name: mapreduce-ui
          image: mapreduce-ui:latest
          imagePullPolicy: Never # Adjust if using an external registry
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: mapreduce-config
            - secretRef:
                name: mapreduce-secrets
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
